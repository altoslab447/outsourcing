name: 每日接案資料更新

on:
  schedule:
    # 每天台灣時間 12:00（UTC 04:00）
    - cron: '0 4 * * *'
  workflow_dispatch:  # 允許手動觸發

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run data generation script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data.json
          git diff --staged --quiet || git commit -m "chore: 每日接案資料更新 $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M') 台灣時間"
          git push
